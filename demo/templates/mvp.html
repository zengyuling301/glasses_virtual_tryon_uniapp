<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ededed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>眼镜虚拟试戴</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='mvp.css') }}" />
</head>
<body>
  <div class="app-shell">
    <header class="mp-header">
      <h1>眼镜虚拟试戴</h1>
      <p class="sub" title="上传正面照 → 分档推荐镜架 → 生成 2D 试戴示意图（非毫米测量）">
        上传正面照 → 分档推荐 → 2D 试戴示意
      </p>
      <p id="globalNotice" class="global-notice hidden" role="status"></p>
    </header>

    <div class="app-stage">
      <section id="panel1" class="step-panel is-active" data-step="1" role="tabpanel" aria-labelledby="tab1">
        <div class="panel-inner">
          <p class="hint hint-tight">正面、光线均匀；可「拍照」采集。</p>
          <div class="upload-row">
            <label class="btn primary">
              选择图片
              <input id="fileInput" type="file" accept="image/*" hidden />
            </label>
            <label class="btn">
              拍照
              <input id="cameraInput" type="file" accept="image/*" capture="user" hidden />
            </label>
          </div>
          <div id="thumbWrap" class="thumb-zone hidden">
            <img id="thumb" alt="预览" />
          </div>
          <p id="fileLabel" class="muted one-line"></p>
          <button id="analyzeBtn" class="btn primary full" type="button" disabled>分析并推荐镜架</button>
          <p id="statusLine" class="status one-line"></p>
          <p class="legal-line">Demo 结论为分档规则，不替代验光与线下试戴。</p>
        </div>
      </section>

      <section id="panel2" class="step-panel" data-step="2" role="tabpanel" aria-labelledby="tab2" hidden>
        <div class="panel-inner panel-inner-grow">
          <div id="metrics" class="metrics-row hidden">
            <div class="m-chip"><span class="k">颊/瞳</span><span id="mRatio" class="v"></span></div>
            <div class="m-chip"><span class="k">分档</span><span id="mBand" class="v pill"></span></div>
            <div class="m-chip"><span class="k">瞳距</span><span id="mIpd" class="v"></span></div>
          </div>
          <p id="recEmpty" class="empty-hint">请先在「拍照」页上传并点击分析。</p>
          <ul id="recList" class="rec-list rec-list-h" aria-label="推荐镜架（横向滑动查看更多）"></ul>
        </div>
      </section>

      <section id="panel3" class="step-panel" data-step="3" role="tabpanel" aria-labelledby="tab3" hidden>
        <div class="panel-inner panel-inner-grow">
          <p class="hint hint-tight">在「推荐」页点选镜架后，在此生成示意图。</p>
          <div class="field-block">
            <label for="frameSelect">当前镜架</label>
            <select id="frameSelect" disabled></select>
          </div>
          <button id="tryonBtn" class="btn primary full tryon-btn" type="button" disabled>生成试戴图</button>
          <p id="tryonStatus" class="status one-line" aria-live="polite"></p>
          <div id="resultWrap" class="result-zone hidden">
            <img id="resultImg" alt="试戴效果" />
          </div>
        </div>
      </section>
    </div>

    <nav class="tab-bar" role="tablist" aria-label="主流程">
      <button id="tab1" class="tab is-active" type="button" role="tab" aria-selected="true" aria-controls="panel1">拍照</button>
      <button id="tab2" class="tab" type="button" role="tab" aria-selected="false" aria-controls="panel2">推荐</button>
      <button id="tab3" class="tab" type="button" role="tab" aria-selected="false" aria-controls="panel3">试戴</button>
    </nav>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fileInput = $("fileInput");
    const cameraInput = $("cameraInput");
    const thumb = $("thumb");
    const thumbWrap = $("thumbWrap");
    const fileLabel = $("fileLabel");
    const analyzeBtn = $("analyzeBtn");
    const tryonBtn = $("tryonBtn");
    const frameSelect = $("frameSelect");
    const statusLine = $("statusLine");
    const tryonStatus = $("tryonStatus");
    const metricsEl = $("metrics");
    const recList = $("recList");
    const recEmpty = $("recEmpty");
    const resultWrap = $("resultWrap");
    const resultImg = $("resultImg");
    const globalNotice = $("globalNotice");
    const tab1 = $("tab1");
    const tab2 = $("tab2");
    const tab3 = $("tab3");
    const panel1 = $("panel1");
    const panel2 = $("panel2");
    const panel3 = $("panel3");

    const panels = [panel1, panel2, panel3];
    const tabs = [tab1, tab2, tab3];

    let currentFile = null;
    let lastRecs = [];
    let step = 1;

    function setStep(n) {
      step = Math.max(1, Math.min(3, n));
      panels.forEach((p, i) => {
        const on = i + 1 === step;
        p.classList.toggle("is-active", on);
        p.hidden = !on;
      });
      tabs.forEach((t, i) => {
        const on = i + 1 === step;
        t.classList.toggle("is-active", on);
        t.setAttribute("aria-selected", on ? "true" : "false");
      });
    }

    tabs.forEach((t, i) => {
      t.addEventListener("click", () => setStep(i + 1));
    });

    function setStatus(msg, isError) {
      statusLine.textContent = msg || "";
      statusLine.classList.toggle("err", !!isError);
    }

    function setGlobalNotice(msg, isError) {
      if (!msg) {
        globalNotice.textContent = "";
        globalNotice.classList.add("hidden");
        return;
      }
      globalNotice.textContent = msg;
      globalNotice.classList.remove("hidden");
      globalNotice.classList.toggle("err", !!isError);
    }

    function setTryonStatus(msg, isError) {
      tryonStatus.textContent = msg || "";
      tryonStatus.classList.toggle("err", !!isError);
    }

    function highlightSelectedFrame() {
      const id = frameSelect.value;
      recList.querySelectorAll(".rec-item").forEach((el) => {
        el.classList.toggle("selected", el.dataset.frameId === id);
      });
    }

    function onPicked(file) {
      if (!file) return;
      currentFile = file;
      fileLabel.textContent = file.name + "（" + (file.size / 1024).toFixed(0) + " KB）";
      const url = URL.createObjectURL(file);
      thumb.src = url;
      thumb.onload = () => URL.revokeObjectURL(url);
      thumbWrap.classList.remove("hidden");
      analyzeBtn.disabled = false;
      tryonBtn.disabled = true;
      frameSelect.innerHTML = "";
      frameSelect.disabled = true;
      metricsEl.classList.add("hidden");
      recList.innerHTML = "";
      recEmpty.classList.remove("hidden");
      resultWrap.classList.add("hidden");
      setStatus("");
      setTryonStatus("");
      setGlobalNotice("");
    }

    fileInput.addEventListener("change", () => onPicked(fileInput.files && fileInput.files[0]));
    cameraInput.addEventListener("change", () => onPicked(cameraInput.files && cameraInput.files[0]));

    recList.addEventListener("click", (e) => {
      const li = e.target.closest(".rec-item");
      if (!li || frameSelect.disabled) return;
      const fid = li.dataset.frameId;
      if (!fid) return;
      frameSelect.value = fid;
      highlightSelectedFrame();
      setStep(3);
    });

    frameSelect.addEventListener("change", () => highlightSelectedFrame());

    function badgeClass(st) {
      if (st === "MATCH") return "ok";
      if (st === "LOW_CONFIDENCE") return "warn";
      return "warn";
    }

    function matchStatusLabel(st) {
      const labels = {
        MATCH: "匹配",
        WARN_TOO_NARROW: "预警：镜架偏窄",
        WARN_TOO_WIDE: "预警：镜架偏宽",
        LOW_CONFIDENCE: "低置信度",
      };
      return labels[st] || st;
    }

    analyzeBtn.addEventListener("click", async () => {
      if (!currentFile) return;
      analyzeBtn.disabled = true;
      setStatus("分析中…");
      const fd = new FormData();
      fd.append("face", currentFile);
      try {
        const res = await fetch("/api/analyze", { method: "POST", body: fd });
        const ct = (res.headers.get("content-type") || "").toLowerCase();
        let data;
        if (!ct.includes("application/json")) {
          const t = await res.text();
          setStatus("服务器返回异常（非 JSON），请重试。" + (t ? " " + t.slice(0, 120) : ""), true);
          analyzeBtn.disabled = false;
          return;
        }
        try {
          data = await res.json();
        } catch (e) {
          setStatus("响应解析失败（可能为网络截断或非 JSON）。请重试。", true);
          analyzeBtn.disabled = false;
          return;
        }
        if (!data.ok) {
          setStatus(data.message || "分析失败", true);
          analyzeBtn.disabled = false;
          return;
        }
        const m = data.metrics;
        $("mRatio").textContent = m.cheek_over_ipd;
        $("mBand").textContent = m.band === "S" ? "偏窄 (S)" : m.band === "M" ? "中等 (M)" : "偏宽 (L)";
        $("mIpd").textContent = m.ipd_px + " px";
        metricsEl.classList.remove("hidden");
        recEmpty.classList.add("hidden");
        if (m.low_confidence) {
          const w = m.low_confidence_reason || "低置信度";
          setStatus("分析完成。");
          setGlobalNotice(w, true);
        } else {
          setStatus("分析完成，已切换至「推荐」。");
          setGlobalNotice("");
        }

        lastRecs = data.recommendations || [];
        recList.innerHTML = "";
        frameSelect.innerHTML = "";
        lastRecs.forEach((r, i) => {
          const li = document.createElement("li");
          li.className = "rec-item";
          li.dataset.frameId = r.id;
          const previewSrc = "/api/frame-preview/" + encodeURIComponent(r.id);
          const altAttr = String(r.name || "镜架")
            .replace(/&/g, "&amp;")
            .replace(/"/g, "&quot;")
            .replace(/</g, "&lt;");
          li.innerHTML =
            '<div class="rec-visual">' +
            '<img class="rec-frame-img" src="' +
            previewSrc +
            '" alt="' +
            altAttr +
            '" loading="lazy" decoding="async" />' +
            "</div>" +
            '<div class="rec-body">' +
            '<div class="rec-title">' +
            r.name +
            ' <span class="tag">' +
            r.band +
            "档</span>" +
            ' <span class="badge ' +
            badgeClass(r.match_status) +
            '">' +
            matchStatusLabel(r.match_status) +
            "</span></div>" +
            '<div class="rec-meta">' +
            (r.mm_total_width ? "约 " + r.mm_total_width + " mm · " : "") +
            (r.blurb || "") +
            "</div>" +
            '<div class="rec-msg">' +
            r.match_message +
            "</div></div>";
          recList.appendChild(li);

          const opt = document.createElement("option");
          opt.value = r.id;
          opt.textContent = r.name + "（" + matchStatusLabel(r.match_status) + "）";
          frameSelect.appendChild(opt);
        });
        frameSelect.disabled = lastRecs.length === 0;
        tryonBtn.disabled = lastRecs.length === 0;
        analyzeBtn.disabled = false;
        highlightSelectedFrame();
        setStep(2);
      } catch (e) {
        setStatus("网络或服务异常：" + e, true);
        analyzeBtn.disabled = false;
      }
    });

    tryonBtn.addEventListener("click", async () => {
      if (!currentFile || frameSelect.disabled) return;
      tryonBtn.disabled = true;
      setTryonStatus("生成中…");
      const fd = new FormData();
      fd.append("face", currentFile);
      fd.append("frame_id", frameSelect.value);
      try {
        const res = await fetch("/api/tryon", { method: "POST", body: fd });
        const ct = (res.headers.get("content-type") || "").toLowerCase();
        if (ct.includes("application/json")) {
          let j;
          try {
            j = await res.json();
          } catch (e) {
            setTryonStatus("响应解析失败，请重试。", true);
            tryonBtn.disabled = false;
            return;
          }
          if (!j.ok) {
            setTryonStatus(j.message || j.error || "生成失败", true);
            tryonBtn.disabled = false;
            return;
          }
          setTryonStatus("未收到图片数据，请重试。", true);
          tryonBtn.disabled = false;
          return;
        }
        if (!res.ok) {
          const t = await res.text();
          setTryonStatus("生成失败：" + (t ? t.slice(0, 200) : res.status), true);
          tryonBtn.disabled = false;
          return;
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        resultImg.src = url;
        resultImg.onload = () => URL.revokeObjectURL(url);
        resultWrap.classList.remove("hidden");
        setTryonStatus("已生成（Demo 线框）。");
        tryonBtn.disabled = false;
      } catch (e) {
        setTryonStatus("请求失败：" + e, true);
        tryonBtn.disabled = false;
      }
    });

    setStep(1);
  </script>
</body>
</html>
